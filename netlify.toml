# Netlify configuration for MockPacker
#
# Build: Vite outputs a static SPA into dist/. Serverless code lives in
# netlify/functions and is bundled with esbuild at deploy time.

[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Friendly API alias so the frontend can call /api/product-search etc.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA fallback — refreshing /days/2026-08-14 (or any client route) must not 404.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache"
