<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0B6E6E" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#4FB0B0" media="(prefers-color-scheme: dark)" />
    <meta
      name="description"
      content="MockPacker — collaborative trip planning and packing. Personalized packing lists, weather-aware outfit plans, group themes, shopping, and shipment tracking."
    />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

    <!-- iOS standalone PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MockPacker" />

    <title>MockPacker — Pack together. Travel ready.</title>

    <!-- Apply the saved theme before first paint to avoid a flash.
         Keep the storage key in sync with src/context/ThemeContext.tsx. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('mp-theme');
          var dark =
            t === 'dark' ||
            ((t === 'system' || t === null) &&
              window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.classList.toggle('dark', dark);
        } catch (e) {
          /* ignore — defaults to light */
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
